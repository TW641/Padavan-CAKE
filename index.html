<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>TW641 | Padavan-CAKE 雲端編譯懶人包</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css"/>

  <style>
    /* 稍微優化一下表格在網頁上的顯示，讓你的 142 款機型表格更好看 */
    .markdown-section table { display: table; width: 100%; }
    .markdown-section td, .markdown-section th { word-break: break-word; }
  </style>
</head>
<body>
  <div id="app">網頁載入中，請稍候... (Loading...)</div>

  <script>
    window.$docsify = {
      name: 'Padavan-CAKE 專案',   // 左上角顯示的網站名稱
      repo: 'TW641/Padavan-CAKE', // 右上角會出現連結到你 GitHub 的掛件
      
      // 1. 設定首頁檔名
      homepage: 'README_TW.md', 
      
      // 2. 【核心修正】：增加路徑別名
      // 這能確保 Docsify 點擊連結時，能正確分辨根目錄與檔案之間的關係
      alias: {
        '/README': '/README.md',
        '/README_CN': '/README_CN.md',
        '/README_TW': '/README_TW.md'
      },

      auto2top: true,     // 點擊目錄後自動捲動到最上面
      maxLevel: 3,        // 抓取 Markdown 標題生成目錄的最大層級
      subMaxLevel: 2      // 側邊欄目錄展開的層級
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
