<body>
    <div id="app"></div>

    <script>
        window.$docsify = {
            name: 'Padavan-CAKE 專案',
            repo: 'TW641/Padavan-CAKE',
            alias: {
                '.*?/README_TW.md': '/README_TW.md',
                '.*?/README_CN.md': '/README_CN.md',
                '.*?/README.md': '/README.md',
                '.*?/README_TW': '/README_TW.md',
                '.*?/README_CN': '/README_CN.md',
                '.*?/README': '/README.md',
                '/': '/README_TW.md'
            },
            auto2top: true,
            maxLevel: 2,
            subMaxLevel: 0,
            loadNavbar: false,
            loadSidebar: false,
            plugins: [
                (hook, vm) => {
                    hook.doneEach(() => {
                        // 【效能優化】將 DOM 操作放入 setTimeout，讓主畫面優先繪製，解決手機版效能驚嘆號
                        setTimeout(() => {
                            // 1. 修復空白列表節點
                            document.querySelectorAll('ul, ol').forEach(list => {
                                Array.from(list.childNodes).forEach(node => {
                                    const isText = node.nodeType === 3 && node.nodeValue.trim() !== '';
                                    const isInvalid = node.nodeType === 1 && !['li', 'script', 'template'].includes(node.tagName.toLowerCase());
                                    if (isText || isInvalid) {
                                        const wrapper = document.createElement('li');
                                        list.insertBefore(wrapper, node);
                                        wrapper.appendChild(node);
                                    }
                                });
                            });
                            
                            // 2. 圖片效能最佳化
                            document.querySelectorAll('img').forEach(img => {
                                img.setAttribute('loading', 'lazy');
                                img.setAttribute('decoding', 'async');
                            });

                            // ==========================================
                            // 3. 無障礙標籤 (效能優化版：徹底分離讀取與寫入)
                            // ==========================================
                            
                            // [階段 A：純讀取] 集中掃描所有節點，避免觸發重新排版
                            const anchors = Array.from(document.querySelectorAll('a.anchor'));
                            const anchorLabels = anchors.map(anchor => {
                                return (anchor.parentElement ? anchor.parentElement.textContent.replace(/#/g, '').trim() : '段落') + ' 的錨點連結';
                            });

                            const extLinks = Array.from(document.querySelectorAll('a[target="_blank"]'));
                            const extLabels = extLinks.map(link => {
                                return link.getAttribute('aria-label') ? null : (link.textContent.trim() || '外部連結') + ' (在新分頁開啟)';
                            });

                            // [階段 B：純寫入] 一次性集中寫入屬性，瞬間完成，確保 Docsify 捲動不會崩潰！
                            anchors.forEach((anchor, i) => {
                                anchor.setAttribute('aria-label', anchorLabels[i]);
                            });

                            extLinks.forEach((link, i) => {
                                if (extLabels[i]) {
                                    link.setAttribute('aria-label', extLabels[i]);
                                }
                            });
                        }, 100);
                    });
                }
            ]
        }
    </script>
