  <script>
    window.$docsify = {
        name: 'Padavan-CAKE 專案',
        repo: 'TW641/Padavan-CAKE',
        
        // 已經移除 darklightTheme 強制設定，回歸自然判定與使用者自由切換
        
        alias: {
            '.*?/README_TW.md': '/README_TW.md',
            '.*?/README_CN.md': '/README_CN.md',
            '.*?/README.md': '/README.md',
            '.*?/README_TW': '/README_TW.md',
            '.*?/README_CN': '/README_CN.md',
            '.*?/README': '/README.md',
            '/': '/README_TW.md'
        },

        auto2top: true,
        maxLevel: 2, 
        subMaxLevel: 0,
        loadNavbar: false,
        loadSidebar: false,

        // 滿分無障礙 + 零重排修復外掛 (直接在記憶體中攔截修改 HTML)
        plugins: [
            function(hook, vm) {
                // 使用 afterEach：在 HTML 字串還沒畫到螢幕上之前，就先把它修好！
                hook.afterEach(function(html, next) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    
                    var lists = doc.querySelectorAll('ul, ol');
                    lists.forEach(function(list) {
                        Array.from(list.children).forEach(function(child) {
                            var tag = child.tagName.toLowerCase();
                            // 發現非法標籤，立刻用 <li> 包裝起來
                            if (tag !== 'li' && tag !== 'script' && tag !== 'template') {
                                var wrapper = doc.createElement('li');
                                list.insertBefore(wrapper, child);
                                wrapper.appendChild(child);
                            }
                        });
                    });
                    
                    // 把修復好、100% 完美的 HTML 丟給瀏覽器去渲染
                    next(doc.body.innerHTML);
                });
            }
        ]
    }
  </script>
