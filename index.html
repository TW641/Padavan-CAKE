    <style>
        /* ========================================================= */
        /* 核心絕招：滿版載入底板 (App Shell) 與透明度控制                */
        /* ========================================================= */
        
        /* 1. 滿版底板，阻擋一切未排版的醜畫面 */
        #loading-baseplate {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ffffff; /* 白底，避免閃爍 */
            z-index: 999999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease-out; /* 淡出動畫 */
        }
        @media (prefers-color-scheme: dark) {
            #loading-baseplate { background-color: #1a1a1a; } /* 支援深色模式的底板 */
        }
        
        .baseplate-text {
            color: var(--theme-color, #42b983); font-weight: bold; font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* 2. 讓主內容在背後偷偷排版 (opacity: 0 免疫 CLS) */
        #app { opacity: 0; transition: opacity 0.5s ease-in; min-height: 100vh; }
        #app.ready { opacity: 1; }

        /* ========================================================= */
        /* 其他基礎排版設定                                            */
        /* ========================================================= */
        html { scrollbar-gutter: stable; }
        body { margin: 0; padding: 0; }
        
        @media screen and (min-width: 768px) {
            body:not(.close) main .content { left: 300px !important; transition: none !important; }
        }

        body, .markdown-section { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif !important; }
        code, pre { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace !important; }
        .progress { display: none !important; }
        
        /* 圖片網格設定 */
        .markdown-section table { display: table; width: 100%; }
        .markdown-section td, .markdown-section th { word-break: break-word; }
        .markdown-section img { display: block; max-width: 100%; height: auto; }
        .image-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 15px 0; }
        .image-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 15px 0; }
        .image-grid-2 img, .image-grid-3 img { margin-bottom: 0 !important; border: 1px solid #ccc; border-radius: 8px; width: 100%; height: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        @media (max-width: 768px) { .image-grid-2, .image-grid-3 { grid-template-columns: 1fr; } }
        
        /* 無障礙高對比修正 */
        .markdown-section a { color: inherit; font-weight: 600; text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-color: var(--theme-color, #42b983); }
        .markdown-section a:hover { text-decoration-color: transparent; }
        .markdown-section blockquote { color: inherit; opacity: 1 !important; border-left-color: var(--theme-color, #42b983); background-color: transparent; padding: 10px 15px; }
        .markdown-section em { color: inherit; font-style: italic; opacity: 1 !important; }

<body>
    <div id="loading-baseplate">
        <div class="baseplate-text">載入中，請稍候...</div>
    </div>

    <div id="app"></div>

    <script>
        window.$docsify = {
            name: 'Padavan-CAKE 專案',
            repo: 'TW641/Padavan-CAKE',
            alias: {
                '.*?/README_TW.md': '/README_TW.md',
                '.*?/README_CN.md': '/README_CN.md',
                '.*?/README.md': '/README.md',
                '.*?/README_TW': '/README_TW.md',
                '.*?/README_CN': '/README_CN.md',
                '.*?/README': '/README.md',
                '/': '/README_TW.md'
            },
            auto2top: true,
            maxLevel: 2,
            subMaxLevel: 0,
            loadNavbar: false,
            loadSidebar: false,
            plugins: [
                (hook, vm) => {
                    hook.doneEach(() => {
                        // 任務 1：最優先執行！揭開布幕讓畫面出來 (使用 requestAnimationFrame 確保畫面最高優先順序)
                        requestAnimationFrame(() => {
                            const app = document.getElementById('app');
                            const baseplate = document.getElementById('loading-baseplate');
                            if (app) app.classList.add('ready');
                            if (baseplate) {
                                baseplate.style.opacity = '0';
                                setTimeout(() => baseplate.style.display = 'none', 500);
                            }
                        });

                        // 任務 2：讓主執行緒喘息 50 毫秒後，再偷偷在背景修復空白列表 (最耗 CPU 的工作)
                        setTimeout(() => {
                            document.querySelectorAll('ul, ol').forEach(list => {
                                Array.from(list.childNodes).forEach(node => {
                                    const isText = node.nodeType === 3 && node.nodeValue.trim() !== '';
                                    const isInvalid = node.nodeType === 1 && !['li', 'script', 'template'].includes(node.tagName.toLowerCase());
                                    if (isText || isInvalid) {
                                        const wrapper = document.createElement('li');
                                        list.insertBefore(wrapper, node);
                                        wrapper.appendChild(node);
                                    }
                                });
                            });
                        }, 50);
                        
                        // 任務 3：再等 150 毫秒後，處理圖片優化
                        setTimeout(() => {
                            document.querySelectorAll('.markdown-section img').forEach(img => {
                                img.setAttribute('loading', 'lazy');
                                img.setAttribute('decoding', 'async');
                            });
                        }, 150);

                        // 任務 4：再等 250 毫秒後，處理無障礙標籤 (最低優先順序)
                        setTimeout(() => {
                            document.querySelectorAll('.markdown-section a').forEach(link => {
                                if (link.classList.contains('anchor')) {
                                    const titleText = link.parentElement ? link.parentElement.textContent.replace(/#/g, '').trim() : '段落';
                                    link.setAttribute('aria-label', titleText + ' 的錨點連結');
                                } else if (link.getAttribute('target') === '_blank' && !link.getAttribute('aria-label')) {
                                    link.setAttribute('aria-label', (link.textContent.trim() || '外部連結') + ' (在新分頁開啟)');
                                }
                            });
                        }, 250);
                    });
                }
            ]
        }
    </script>
